
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BiblioSphere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f5f4f0;
--bg2:#eeecea;
--bg3:#e7e4e0;
--surface:#ffffff;
--surface2:#fafaf8;
--surface3:#f2f0ec;
--border:#d4d0ca;
--border2:#c0bbb3;
--border3:#a8a29a;
--text:#1a1814;
--text2:#3d3830;
--text3:#7a7268;
--text4:#a09890;
--accent:#2563eb;
--accent2:#1d4ed8;
--accent-bg:#eff6ff;
--accent-border:#bfdbfe;
--teal:#0d9488;
--teal-bg:#f0fdfa;
--coral:#dc2626;
--coral-bg:#fef2f2;
--amber:#b45309;
--amber-bg:#fffbeb;
--green:#15803d;
--green-bg:#f0fdf4;
--pink:#be185d;
--pink-bg:#fdf2f8;
--purple:#7c3aed;
--purple-bg:#f5f3ff;
--r:12px;--r2:8px;--r3:18px;
--font-display:'Outfit',sans-serif;
--font-body:'Outfit',sans-serif;
--font-serif:'Fraunces',serif;
--font-mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;}
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.logo-area{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;color:#fff;}
.logo-text{font-family:var(--font-display);font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
.logo-text span{color:var(--accent);}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;scrollbar-width:none;}
.nav-section{margin-bottom:18px;}
.nav-label{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.09em;padding:0 8px;margin-bottom:5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;transition:all .12s;color:var(--text3);margin-bottom:1px;}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600;}
.nav-icon{width:17px;height:17px;flex-shrink:0;font-size:15px;display:flex;align-items:center;justify-content:center;}
.nav-text{font-size:13px;font-weight:500;}
.nav-badge{margin-left:auto;background:var(--coral);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border);}
.user-card{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);background:var(--bg2);cursor:pointer;border:1px solid var(--border);}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.user-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-role{font-size:10px;color:var(--text3);}
.role-chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);flex-shrink:0;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.page-title{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:6px 11px;flex:1;max-width:380px;cursor:pointer;transition:border-color .15s;}
.search-box:hover{border-color:var(--border2);}
.search-placeholder{color:var(--text4);font-size:12px;flex:1;}
.topbar-actions{display:flex;align-items:center;gap:7px;}
.icon-btn{width:32px;height:32px;border-radius:var(--r2);background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:all .12s;font-size:15px;position:relative;}
.icon-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2);}
.notif-dot{position:absolute;top:5px;right:5px;width:5px;height:5px;background:var(--coral);border-radius:50%;border:1.5px solid var(--surface);}
.content{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .15s;}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.stat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:16px;}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.stat-value{font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--text);line-height:1;}
.stat-change{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:3px;font-weight:500;}
.up{color:var(--green);}
.down{color:var(--coral);}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:1100px){.grid-2{grid-template-columns:1fr;}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r2);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;letter-spacing:.01em;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent2);}
.btn-primary:hover{background:var(--accent2);}
.btn-outline{background:var(--surface);border-color:var(--border2);color:var(--text2);}
.btn-outline:hover{background:var(--bg2);border-color:var(--border3);color:var(--text);}
.btn-sm{padding:5px 11px;font-size:11px;}
.btn-ghost{background:transparent;border:none;color:var(--text3);padding:5px 9px;font-size:12px;}
.btn-ghost:hover{color:var(--text);}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;}
.badge-blue{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0;}
.badge-red{background:var(--coral-bg);color:var(--coral);border:1px solid #fecaca;}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a;}
.badge-teal{background:var(--teal-bg);color:var(--teal);border:1px solid #99f6e4;}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid #ddd6fe;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 13px;color:var(--text4);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--bg2);}
td{padding:11px 13px;border-bottom:1px solid var(--border);color:var(--text2);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}

/* BOOK GRID */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px;}
.book-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s;}
.book-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06);}
.book-cover{height:170px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;background:var(--bg2);}
.book-status-pill{position:absolute;top:7px;right:7px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;}
.book-info{padding:11px;}
.book-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.book-author{font-size:11px;color:var(--text4);}
.book-rating{display:flex;align-items:center;gap:2px;font-size:11px;color:var(--amber);margin-top:5px;}

/* ACTIVITY */
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.activity-text{font-size:12px;color:var(--text2);line-height:1.5;}
.activity-text strong{color:var(--text);font-weight:600;}
.activity-time{font-size:10px;color:var(--text4);margin-top:1px;}

/* PROGRESS */
.progress-bar{background:var(--bg3);border-radius:20px;height:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:20px;}

/* CHART AREA */
.chart-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text);}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}

/* AI CHAT */
.chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.msg{max-width:85%;display:flex;flex-direction:column;gap:3px;}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.ai{align-self:flex-start;}
.msg-bubble{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.6;}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:3px;}
.msg.ai .msg-bubble{background:var(--surface);color:var(--text);border-bottom-left-radius:3px;border:1px solid var(--border);}
.msg-time{font-size:10px;color:var(--text4);}
.typing-indicator{display:flex;gap:3px;align-items:center;padding:9px 13px;background:var(--surface);border-radius:14px;border-bottom-left-radius:3px;border:1px solid var(--border);width:fit-content;}
.typing-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:tb 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.chat-input-area{padding:14px 18px;border-top:1px solid var(--border);background:var(--surface2);}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:9px 13px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;resize:none;transition:border-color .15s;height:38px;}
.chat-input:focus{border-color:var(--accent);}
.send-btn{width:38px;height:38px;border-radius:var(--r2);background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .12s;flex-shrink:0;}
.send-btn:hover{background:var(--accent2);}
.suggestion-chip{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--text3);cursor:pointer;transition:all .12s;font-weight:500;}
.suggestion-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-header{padding:22px 22px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.modal-body{padding:18px 22px 22px;}
.close-btn{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:13px;}
.close-btn:hover{background:var(--bg3);}

/* TOAST */
.toast-container{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:2000;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;display:flex;align-items:center;gap:9px;min-width:260px;font-size:12px;font-weight:500;animation:slideIn .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.08);}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-left:3px solid var(--green);}
.toast.warning{border-left:3px solid var(--amber);}
.toast.error{border-left:3px solid var(--coral);}
.toast.info{border-left:3px solid var(--accent);}
.toast-close{margin-left:auto;cursor:pointer;color:var(--text4);font-size:13px;}

/* SEARCH MODAL */
.search-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);width:580px;max-width:95vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);}
.search-modal-input{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);}
.search-modal-input input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:var(--font-display);font-weight:500;}
.search-results{padding:8px 0;max-height:380px;overflow-y:auto;}
.search-result-item{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;transition:background .1s;}
.search-result-item:hover{background:var(--bg2);}
.kbd{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:var(--font-mono);font-size:10px;color:var(--text3);}

/* CAT PILLS */
.cat-pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;transition:all .12s;color:var(--text3);background:var(--surface);}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.cat-pill:hover:not(.active){border-color:var(--border2);color:var(--text);}

/* TOGGLE */
.toggle{width:34px;height:18px;background:var(--bg3);border-radius:9px;cursor:pointer;position:relative;transition:background .2s;border:1px solid var(--border);}
.toggle.on{background:var(--accent);border-color:var(--accent2);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.toggle.on::after{transform:translateX(16px);}

/* NOTIF */
.notif-item{display:flex;gap:11px;padding:11px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.notif-item:hover{background:var(--bg2);}
.notif-item.unread{background:var(--accent-bg);}
.unread-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;margin-top:5px;flex-shrink:0;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:8px 11px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.form-input::placeholder{color:var(--text4);}
.form-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:8px 11px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;cursor:pointer;}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:36px;width:390px;max-width:95vw;box-shadow:0 4px 32px rgba(0,0,0,.06);}
.auth-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--text);margin-bottom:3px;}
.auth-subtitle{font-size:13px;color:var(--text3);margin-bottom:24px;}
.divider{display:flex;align-items:center;gap:9px;margin:18px 0;font-size:11px;color:var(--text4);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.social-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:9px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;font-family:var(--font-body);margin-bottom:8px;}
.social-btn:hover{background:var(--bg2);border-color:var(--border2);}

/* LANDING */
.landing{min-height:100vh;background:var(--bg);overflow-y:auto;}
.landing-nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 36px;background:rgba(245,244,240,.95);border-bottom:1px solid var(--border);}
.hero{padding:72px 40px 60px;text-align:center;background:var(--bg);}
.hero-label{display:inline-flex;align-items:center;gap:6px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:20px;padding:4px 13px;font-size:11px;font-weight:700;color:var(--accent);margin-bottom:18px;text-transform:uppercase;letter-spacing:.05em;}
.hero-title{font-family:var(--font-serif);font-size:clamp(34px,5.5vw,62px);font-weight:700;line-height:1.1;color:var(--text);margin-bottom:18px;}
.hero-title em{font-style:italic;color:var(--accent);}
.hero-subtitle{font-size:16px;color:var(--text3);max-width:520px;margin:0 auto 28px;line-height:1.7;font-weight:400;}
.hero-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:44px;}
.hero-stat-num{font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--text);}
.hero-stat-label{font-size:11px;color:var(--text4);margin-top:1px;font-weight:500;}
.features-section{padding:56px 40px;max-width:1200px;margin:0 auto;}
.section-eyebrow{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;}
.section-title{font-family:var(--font-serif);font-size:clamp(22px,3.5vw,36px);font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.2;}
.section-subtitle{font-size:14px;color:var(--text3);max-width:480px;line-height:1.7;margin-bottom:36px;}
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;transition:all .15s;}
.feature-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.feature-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;}
.feature-title{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;}
.feature-desc{font-size:12px;color:var(--text3);line-height:1.6;}
.pricing-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:26px;transition:all .15s;}
.pricing-card.featured{border:2px solid var(--accent);background:var(--accent-bg);}
.pricing-name{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;}
.pricing-price{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--text);margin-bottom:4px;}
.landing-footer{padding:28px 40px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:var(--surface);}

/* MISC */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.settings-label{font-size:13px;color:var(--text);font-weight:500;}
.settings-sublabel{font-size:11px;color:var(--text4);margin-top:1px;}

function showToast(msg,type='success'){
  const icons={success:'✓',error:'✕',warning:'!',info:'i'};
  const colors={success:'var(--green)',error:'var(--coral)',warning:'var(--amber)',info:'var(--accent)'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span style="color:${colors[type]};font-weight:700;font-size:14px;">${icons[type]}</span><span style="color:var(--text);">${msg}</span><span class="toast-close" onclick="this.parentElement.remove()">✕</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

function Stars(r){let s='';for(let i=1;i<=5;i++)s+=`<span style="color:${i<=Math.floor(r)?'#b45309':'#d4d0ca'}">★</span>`;return s;}

async function askGrok(messages){
  try{
    const resp=await fetch('https://api.x.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer xai-demo-key'},
      body:JSON.stringify({
        model:'grok-2-latest',
        messages:[
          {role:'system',content:`You are BiblioSphere's AI Librarian powered by Grok. Help users find books, get recommendations, and answer library questions. Be concise and helpful. Library catalog includes: ${BOOKS.map(b=>b.title+' by '+b.author+' ('+b.status+')').join('; ')}.`},
          ...messages
        ],
        max_tokens:500,temperature:0.7
      })
    });
    if(!resp.ok)throw new Error('API error');
    const data=await resp.json();
    return data.choices[0].message.content;
  }catch(e){
    return "I can't connect to Grok AI right now. Add your API key in Settings. Meanwhile, here are some top picks:\n\n📚 **Atomic Habits** — Most borrowed this month\n🪐 **Project Hail Mary** — Highest rated sci-fi\n🧬 **Sapiens** — Best in History\n\nTry asking: *\"Find beginner AI books\"* or *\"Recommend books like Dune\"*";
  }
}

async function sendChat(msg){
  if(!msg.trim())return;
  state.chatMessages=[...state.chatMessages,{role:'user',content:msg,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}];
  state.aiLoading=true;render();
  const el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;
  const reply=await askGrok(state.chatMessages.map(m=>({role:m.role,content:m.content})));
  state.chatMessages=[...state.chatMessages,{role:'assistant',content:reply,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}];
  state.aiLoading=false;render();
  const el2=document.getElementById('chatMsgs');if(el2)el2.scrollTop=el2.scrollHeight;
}

    ${[{icon:'📚',bg:'var(--accent-bg)',t:'Getting Started',d:'Set up your library in 10 min'},{icon:'🤖',bg:'var(--purple-bg)',t:'AI Features',d:'Master the AI assistant'},{icon:'📊',bg:'var(--teal-bg)',t:'Analytics Guide',d:'Understanding your metrics'},{icon:'⚙️',bg:'var(--amber-bg)',t:'Configuration',d:'Advanced settings'},{icon:'👥',bg:'var(--green-bg)',t:'User Management',d:'Roles and permissions'},{icon:'📋',bg:'var(--coral-bg)',t:'Reports',d:'Generating exports'}].map(f=>`
    <div class="card" style="text-align:center;padding:18px 12px;cursor:pointer;">
      <div style="width:40px;height:40px;border-radius:10px;background:${f.bg};display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 9px;">${f.icon}</div>
      <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;">${f.t}</div>
      <div style="font-size:11px;color:var(--text4);">${f.d}</div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="settings-section-title">Frequently Asked Questions</div>
    ${[
      {q:'How do I add books in bulk?',a:'Go to Books → Import CSV. Download the template, fill in book details, and upload. ISBNs are auto-validated on import.'},
      {q:'How does the AI recommendation work?',a:'BiblioSphere uses Grok AI to analyze borrowing history, user preferences, and catalog metadata to suggest books via semantic similarity.'},
      {q:'Can I set custom fine rates?',a:'Yes! Go to Settings → Borrowing Rules and set your fine amount per day, maximum fine cap, and grace period.'},
      {q:'How do I generate reports for administration?',a:'Navigate to Reports, choose your report type and date range, then generate as PDF, Excel, or CSV. Monthly reports can be automated.'},
    ].map((item,i)=>`<div style="border-bottom:1px solid var(--border);padding:13px 0;${i===3?'border-bottom:none;':''}">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;">❓ ${item.q}</div>
      <div style="font-size:12px;color:var(--text3);line-height:1.7;padding-left:18px;">${item.a}</div>
    </div>`).join('')}
  </div>
  <div style="text-align:center;margin-top:20px;padding:22px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);">
    <div style="font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text);margin-bottom:7px;">Still need help?</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:14px;font-weight:500;">Our support team responds within 2 hours on business days</p>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button class="btn btn-primary" onclick="showToast('Opening support chat…','info')">💬 Live Chat</button>
      <button class="btn btn-outline" onclick="showToast('Email opened','info')">📧 Email Support</button>
    </div>
  </div>
</div>`;
}

function toggleSetting(k){state.settingsToggles[k]=!state.settingsToggles[k];render();showToast(`${k} ${state.settingsToggles[k]?'enabled':'disabled'}`,'info');}

function render(){
  const app=document.getElementById('app');if(!app)return;
  if(state.page==='landing'){app.innerHTML=renderLanding();}
  else if(state.page==='login'){app.innerHTML=renderLogin();}
  else if(state.user){
    const pages={dashboard:renderDashboard,books:renderBooks,ai:renderAI,analytics:renderAnalytics,users:renderUsers,issue:renderIssue,reports:renderReports,notifications:renderNotifications,settings:renderSettings,help:renderHelp};
    app.innerHTML=renderApp((pages[state.page]||renderDashboard)());
  } else {app.innerHTML=renderLogin();}
  initCharts();
}

function initCharts(){
  if(typeof Chart==='undefined')return;
  Chart.defaults.color='#7a7268';
  Chart.defaults.borderColor='rgba(0,0,0,0.06)';
  if(document.getElementById('borrowChart')&&!document.getElementById('borrowChart').__c){
    const ctx=document.getElementById('borrowChart');ctx.__c=true;
    new Chart(ctx,{type:'line',data:{labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],datasets:[{label:'2025',data:[42,67,55,89,73,91,84,103,78,95,110,88],borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.08)',tension:.4,fill:true,pointRadius:3,pointBackgroundColor:'#2563eb'},{label:'2024',data:[35,52,48,71,65,78,72,88,68,82,95,76],borderColor:'#0d9488',backgroundColor:'transparent',tension:.4,borderDash:[4,4],pointRadius:2,pointBackgroundColor:'#0d9488'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:'Outfit',size:11}}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{family:'Outfit',size:11}}}}}});
  }
  if(document.getElementById('catChart')&&!document.getElementById('catChart').__c){
    const ctx=document.getElementById('catChart');ctx.__c=true;
    new Chart(ctx,{type:'doughnut',data:{labels:['Technology','Sci-Fi','History','Programming','Self-Help','Other'],datasets:[{data:[18,15,14,11,10,32],backgroundColor:['#2563eb','#0d9488','#dc2626','#b45309','#15803d','#7c3aed'],borderWidth:2,borderColor:'#ffffff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false}}}});
  }
  if(document.getElementById('weekChart')&&!document.getElementById('weekChart').__c){
    const ctx=document.getElementById('weekChart');ctx.__c=true;
    new Chart(ctx,{type:'bar',data:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],datasets:[{label:'Borrows',data:[45,67,89,72,55,38,20],backgroundColor:'rgba(37,99,235,0.15)',borderColor:'#2563eb',borderWidth:1.5,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:'Outfit',size:11}}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{family:'Outfit',size:11}}}}}});
  }
}

window.navigate=navigate;window.loginAs=loginAs;window.openSearch=openSearch;window.closeSearch=closeSearch;window.updateSearch=updateSearch;window.selectBook=selectBook;window.openBook=openBook;window.closeModal=closeModal;window.issueBook=issueBook;window.filterBooks=filterBooks;window.sendChat=sendChat;window.submitChat=submitChat;window.handleChatKey=handleChatKey;window.toggleSetting=toggleSetting;window.showToast=showToast;

render();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" onload="initCharts()"></script>
</body>
</html>
